
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PadelCast AI — Audio Edition</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0a0a0a;color:#f0f0f0;overflow:hidden;height:100dvh}
  .setup{padding:20px 16px;max-width:480px;margin:0 auto;overflow-y:auto;height:100dvh;padding-bottom:120px}
  h1{font-size:22px;font-weight:800;text-align:center;letter-spacing:-0.02em}
  h1 span{color:#4ade80}
  .sub{font-size:13px;color:#666;text-align:center;margin:4px 0 20px}
  .lb{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#555;margin-bottom:6px}
  .cd{background:#161616;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #1e1e1e}
  .ta{color:#4ade80}.tb{color:#f59e0b}
  input[type="text"]{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #252525;background:#0e0e0e;color:#f0f0f0;font-size:14px;outline:none;margin-bottom:8px}
  input[type="range"]{width:100%}
  .cols{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 0}
  .dot{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .12s}
  .dot.s{border-color:#4ade80;transform:scale(1.15)}
  .dot.w{border-color:#333}.dot.w.s{border-color:#4ade80}
  .pb{padding:6px 12px;border-radius:6px;border:1px solid #252525;background:#0e0e0e;color:#777;cursor:pointer;font-size:12px}
  .pb.on{border-color:#4ade80;background:#14532d;color:#4ade80}
  .seg{display:flex;gap:6px}
  .ht{font-size:11px;color:#444;margin-top:4px;line-height:1.4}
  .go{width:100%;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px}
  .go.ok{background:#16a34a;color:#fff}.go.no{background:#1a1a1a;color:#444;cursor:not-allowed}

  .live{display:flex;flex-direction:column;height:100dvh}
  .vb{position:relative;flex-shrink:0;background:#000}
  .vb video{width:100%;display:block}
  .top{position:absolute;top:8px;left:8px;right:8px;display:flex;align-items:center;justify-content:space-between;gap:6px}
  .pill{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.8);border-radius:16px;padding:4px 10px;backdrop-filter:blur(4px)}
  .sd{width:7px;height:7px;border-radius:50%}
  .sd.on{background:#ef4444;box-shadow:0 0 6px #ef4444;animation:p 1.5s infinite}.sd.w{background:#eab308}
  .st{font-size:11px;color:#fff;font-weight:600}
  .lg{position:absolute;bottom:6px;left:6px;display:flex;gap:4px;flex-wrap:wrap}
  .li{background:rgba(0,0,0,.8);border-radius:8px;padding:2px 8px;display:flex;align-items:center;gap:4px;font-size:10px;backdrop-filter:blur(4px)}
  .ld{width:7px;height:7px;border-radius:50%}
  .hitflash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:60px;opacity:0;pointer-events:none}
  .hitflash.go2{animation:hf .4s ease}
  @keyframes hf{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.6)}}

  .meters{display:flex;flex-direction:column;gap:4px;padding:6px 12px;background:#111;border-bottom:1px solid #1a1a1a;flex-shrink:0}
  .mrow{display:flex;align-items:center;gap:8px}
  .mrow .ic{font-size:12px;width:16px;text-align:center}
  .mbar{flex:1;height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden}
  .mfill{height:100%;width:0%;border-radius:3px;transition:width .1s}
  .mfill.mot{background:linear-gradient(90deg,#22c55e,#eab308,#ef4444)}
  .mfill.aud{background:linear-gradient(90deg,#06b6d4,#a78bfa,#ec4899)}
  .mtag{font-size:10px;color:#666;font-family:monospace;min-width:54px;text-align:right}

  .feed{flex:1;overflow-y:auto;padding:6px 12px}
  .cr{padding:8px 10px;border-radius:8px;margin-bottom:3px}
  .cr.nw{animation:fi .3s ease}
  .cr.norm{border-left:3px solid #4ade80;background:#0a1a0a}
  .cr.serve{border-left:3px solid #06b6d4;background:#04141a}
  .cr.hot{border-left:3px solid #ef4444;background:#1a0505}
  .cr.sys{border-left:3px solid #555;background:#111}
  .ct{color:#4ade80;font-family:monospace;font-size:10px;font-weight:600}
  .cx{font-size:13px;line-height:1.45;color:#ccc;margin-top:2px}
  .cx.h{color:#fff;font-weight:600;font-size:15px}

  .bb{padding:8px 12px 16px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
  .sens{display:flex;align-items:center;gap:8px;font-size:11px;color:#888}
  .sbtn{width:100%;padding:12px;border-radius:10px;border:none;background:#ef4444;color:#fff;font-size:14px;font-weight:700;cursor:pointer}

  @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="setup" class="setup">
  <div style="font-size:32px;text-align:center;margin-bottom:4px">🏓🎤</div>
  <h1>Padel<span>Cast</span> AI</h1>
  <p class="sub">Audio edition — sente ogni colpo</p>
  <div id="pbox"></div>

  <div class="cd">
    <div class="lb" style="color:#a78bfa">Lato del campo</div>
    <div class="ht" style="margin-bottom:8px">Da dove filmi, Coppia A è più verso...</div>
    <div class="seg" id="sideseg"></div>
  </div>

  <div class="cd">
    <div class="lb" style="color:#06b6d4">Voce telecronista (LLM)</div>
    <div id="pvb" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px"></div>
    <div id="apif"></div>
  </div>

  <div class="cd">
    <div class="lb" style="color:#ec4899">Voce parlata</div>
    <div id="ttsbtns" style="display:flex;gap:6px;margin-bottom:10px"></div>
    <div id="ttsf"></div>
  </div>

  <button class="go no" id="go" disabled onclick="startLive()">▶ Avvia la diretta</button>
  <div id="ghint" style="text-align:center;font-size:12px;color:#444;margin-top:8px"></div>
</div>

<div id="live" class="live" style="display:none">
  <div class="vb">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="mcnv" width="160" height="120" style="display:none"></canvas>
    <div class="top">
      <div class="pill"><div class="sd w" id="sd"></div><span class="st" id="stx">Avvio...</span></div>
      <div class="pill"><span class="st" id="hitc">🎾 0</span></div>
      <div class="pill" id="spk" style="display:none"><span style="font-size:10px;color:#4ade80">🔊</span></div>
    </div>
    <div class="hitflash" id="hitflash">🎾</div>
    <div class="lg" id="lg"></div>
  </div>
  <div class="meters">
    <div class="mrow"><span class="ic">⚡</span><div class="mbar"><div class="mfill mot" id="mfill"></div></div><span class="mtag" id="mtag">attesa</span></div>
    <div class="mrow"><span class="ic">🎤</span><div class="mbar"><div class="mfill aud" id="afill"></div></div><span class="mtag" id="atag">—</span></div>
  </div>
  <div class="feed" id="feed"></div>
  <div class="bb">
    <div class="sens">🎤 Sensibilità colpi <input type="range" id="sens" min="1" max="10" value="6" oninput="SENS=+this.value"></div>
    <button class="sbtn" onclick="stopLive()">⏹ Ferma</button>
  </div>
</div>

<script>
const CL=[{n:"Rosso",h:"#DC2626"},{n:"Blu",h:"#2563EB"},{n:"Bianco",h:"#FFFFFF"},{n:"Nero",h:"#1a1a1a"},{n:"Verde",h:"#16A34A"},{n:"Giallo",h:"#EAB308"},{n:"Arancione",h:"#EA580C"},{n:"Rosa",h:"#EC4899"},{n:"Viola",h:"#7C3AED"},{n:"Azzurro",h:"#06B6D4"},{n:"Grigio",h:"#6B7280"}];

const PV=[
  {id:"qwen-intl",nm:"Qwen (Intl)",url:"https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions",md:"qwen-vl-max",ht:"bailian.console.aliyun.com → API Key sk-... (qwen-vl-max funziona, o usa qwen-plus se attivo)"},
  {id:"qwen-cn",nm:"Qwen (Cina)",url:"https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions",md:"qwen-vl-max",ht:"dashscope.console.aliyun.com → API Key sk-..."},
  {id:"groq",nm:"Groq",url:"https://api.groq.com/openai/v1/chat/completions",md:"llama-3.3-70b-versatile",ht:"console.groq.com → gsk_... gratis e velocissimo."},
  {id:"openrouter",nm:"OpenRouter",url:"https://openrouter.ai/api/v1/chat/completions",md:"google/gemini-flash-1.5",ht:"openrouter.ai → sk-or-v1-..."},
  {id:"ollama",nm:"Ollama",url:"http://localhost:11434/v1/chat/completions",md:"llama3.1:8b",ht:"Locale, gratis."},
];

let S={pl:[{nm:"",sh:""},{nm:"",sh:""},{nm:"",sh:""},{nm:"",sh:""}],sideA:"sinistra",pv:"qwen-intl",key:"",url:PV[0].url,md:PV[0].md,tts:"browser",elKey:"",elVoice:""};
var LIVE_KEY="", SENS=6;

// audio + motion state
let G={
  stream:null, tick:null, raf:null,
  audioCtx:null, analyser:null, freq:null, prevFreq:null, fluxBuf:[], lastHitT:0, audLevel:0,
  prevLuma:null, motionBuf:[], state:"idle", lastActiveTs:0, idleSince:0, lastServeTease:0,
  rally:{active:false,hits:[],start:0,lastHit:0,maxE:0,energies:[],leftA:0,rightA:0},
  pointCount:0, commentedLast:false, history:[], busy:false, speaking:false, lastInterject:0,
};

// tunables
const SAMPLE_MS=220, ACTION_TH=6, IDLE_TH=2.5;
const RALLY_GAP=2000, DEBOUNCE=120, LO_BIN=40, HI_BIN=240, FLUX_RATIO=1.7;

// ===== SETUP =====
function rP(){const b=document.getElementById("pbox");b.innerHTML="";S.pl.forEach((p,i)=>{const d=document.createElement("div");d.className="cd";const tc=i<2?"ta":"tb",tn=i<2?`Coppia A — G${i+1}`:`Coppia B — G${i-1}`;d.innerHTML=`<div class="lb ${tc}">${tn}</div><input type="text" placeholder="Nome" value="${p.nm}" oninput="S.pl[${i}].nm=this.value;chk()"><div class="lb">Maglia</div><div class="cols" id="c${i}"></div>`;b.appendChild(d);const cd=d.querySelector(`#c${i}`);CL.forEach(c=>{const dt=document.createElement("div");dt.className=`dot${p.sh===c.n?" s":""}${c.n==="Bianco"?" w":""}`;dt.style.backgroundColor=c.h;dt.title=c.n;dt.onclick=()=>{S.pl[i].sh=c.n;rP();chk()};cd.appendChild(dt)})})}
function rSide(){const s=document.getElementById("sideseg");s.innerHTML="";["sinistra","destra"].forEach(side=>{const b=document.createElement("button");b.className=`pb${S.sideA===side?" on":""}`;b.textContent=side;b.onclick=()=>{S.sideA=side;rSide()};s.appendChild(b)})}
function rPv(){const b=document.getElementById("pvb");b.innerHTML="";PV.forEach(p=>{const bt=document.createElement("button");bt.className=`pb${S.pv===p.id?" on":""}`;bt.textContent=p.nm;bt.onclick=()=>{S.pv=p.id;S.url=p.url;S.md=p.md;rPv();chk()};b.appendChild(bt)});const pv=PV.find(p=>p.id===S.pv);document.getElementById("apif").innerHTML=`${S.pv!=="ollama"?`<div class="ht" style="color:#4ade80;margin-bottom:8px">La API key te la chiedo all'avvio.</div>`:""}<input type="text" placeholder="Endpoint" value="${S.url}" oninput="S.url=this.value"><input type="text" placeholder="Modello" value="${S.md}" oninput="S.md=this.value"><div class="ht">${pv.ht}</div>`}
function rTTS(){const b=document.getElementById("ttsbtns");b.innerHTML="";[{id:"browser",nm:"Browser (gratis)"},{id:"elevenlabs",nm:"ElevenLabs"}].forEach(t=>{const bt=document.createElement("button");bt.className=`pb${S.tts===t.id?" on":""}`;bt.textContent=t.nm;bt.onclick=()=>{S.tts=t.id;rTTS()};b.appendChild(bt)});const f=document.getElementById("ttsf");f.innerHTML=S.tts==="elevenlabs"?`<input type="text" placeholder="ElevenLabs Voice ID" value="${S.elVoice}" oninput="S.elVoice=this.value"><div class="ht">elevenlabs.io → Voice ID di una voce italiana. La key te la chiedo all'avvio.</div>`:`<div class="ht">Voce del telefono. Parte subito.</div>`}
function chk(){const pok=S.pl.every(p=>p.nm&&p.sh);const ok=pok&&S.url&&S.md;document.getElementById("go").className=ok?"go ok":"go no";document.getElementById("go").disabled=!ok;const h=document.getElementById("ghint");h.textContent=!pok?"Metti nome e maglia per tutti e 4":"Si parte!";h.style.color=ok?"#4ade80":"#444"}

// ===== LIVE START =====
async function startLive(){
  if(S.pv!=="ollama"){const k=prompt("API Key del modello:");if(!k){alert("Serve la key");return}LIVE_KEY=k.trim()}
  if(S.tts==="elevenlabs"){const ek=prompt("API Key ElevenLabs:");if(ek)S.elKey=ek.trim()}
  document.getElementById("setup").style.display="none";
  document.getElementById("live").style.display="flex";
  const lg=document.getElementById("lg");lg.innerHTML="";S.pl.forEach(p=>{const c=CL.find(x=>x.n===p.sh);const d=document.createElement("div");d.className="li";d.innerHTML=`<div class="ld" style="background:${c?.h||"#888"}"></div>${p.nm}`;lg.appendChild(d)});
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}},audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    G.stream=stream;
    const vid=document.getElementById("vid");vid.srcObject=stream;
    setupAudio(stream);
    vid.onloadeddata=()=>{
      setSt("on","In diretta");
      kickoff();
      G.tick=setInterval(tick,SAMPLE_MS);
      G.raf=requestAnimationFrame(audioLoop);
    };
  }catch(e){addC("sys",ts(),"Errore: serve permesso telecamera E microfono. "+e.message)}
}

async function kickoff(){
  const names=S.pl.map(p=>p.nm).join(", ");
  const t=await llm(`Telecronista scatenatissimo da bar dello sport. Apri la diretta di una partita di padel tra amici: ${names}. UNA frase esplosiva di apertura. Solo la frase.`);
  if(t){addC("norm",ts(),t);await speak(t)}
}

// ===== AUDIO: rilevamento colpi =====
function setupAudio(stream){
  const AC=window.AudioContext||window.webkitAudioContext;
  G.audioCtx=new AC();
  const src=G.audioCtx.createMediaStreamSource(stream);
  G.analyser=G.audioCtx.createAnalyser();
  G.analyser.fftSize=1024;
  G.analyser.smoothingTimeConstant=0;
  src.connect(G.analyser);
  G.freq=new Uint8Array(G.analyser.frequencyBinCount);
  G.prevFreq=new Float32Array(G.analyser.frequencyBinCount);
}

function audioLoop(){
  if(!G.analyser){return}
  G.analyser.getByteFrequencyData(G.freq);
  let flux=0,energy=0;
  for(let b=LO_BIN;b<HI_BIN;b++){
    const v=G.freq[b];
    energy+=v;
    const d=v-G.prevFreq[b];
    if(d>0)flux+=d;
    G.prevFreq[b]=v;
  }
  // livello audio per UI (0-100)
  G.audLevel=Math.min(100,energy/((HI_BIN-LO_BIN)*255)*100*3);
  document.getElementById("afill").style.width=G.audLevel+"%";

  // baseline flux
  G.fluxBuf.push(flux);if(G.fluxBuf.length>30)G.fluxBuf.shift();
  const base=G.fluxBuf.reduce((a,b)=>a+b,0)/G.fluxBuf.length;

  // soglia: relativa + gate assoluto guidato dalla sensibilità
  const gate=(11-SENS)*220;
  const now=performance.now();
  if(!G.speaking && flux>base*FLUX_RATIO && flux>gate && now-G.lastHitT>DEBOUNCE){
    G.lastHitT=now;
    registerHit(energy);
  }
  G.raf=requestAnimationFrame(audioLoop);
}

function registerHit(energy){
  const now=performance.now();
  const r=G.rally;
  if(!r.active || now-r.lastHit>RALLY_GAP){
    if(r.active) closeRally();
    G.rally={active:true,hits:[],start:now,lastHit:now,maxE:0,energies:[],leftA:G.lastLeft||0,rightA:G.lastRight||0};
  }
  const rr=G.rally;
  rr.hits.push(now);rr.lastHit=now;rr.energies.push(energy);
  if(energy>rr.maxE)rr.maxE=energy;
  document.getElementById("hitc").textContent="🎾 "+rr.hits.length;
  document.getElementById("atag").textContent="COLPO";
  flashHit();

  // bordata in mezzo allo scambio? (forte rispetto alla media)
  const avgE=rr.energies.reduce((a,b)=>a+b,0)/rr.energies.length;
  if(rr.hits.length>=3 && energy>avgE*1.45 && now-G.lastInterject>6000 && !G.busy){
    G.lastInterject=now;
    interjectSmash(rr.hits.length);
  }
}

function closeRally(){
  const r=G.rally;
  const n=r.hits.length;
  const dur=(r.lastHit-r.start)/1000;
  r.active=false;
  if(n>=2){
    G.pointCount++;
    decidePoint(n,dur,r);
  }
  document.getElementById("hitc").textContent="🎾 0";
}

function flashHit(){
  const f=document.getElementById("hitflash");
  f.classList.remove("go2");void f.offsetWidth;f.classList.add("go2");
}

// ===== MOTION (zone sinistra/destra + intensità) =====
function tick(){
  // motion
  const vid=document.getElementById("vid");
  if(vid&&vid.readyState>=2){
    const cnv=document.getElementById("mcnv");
    const ctx=cnv.getContext("2d",{willReadFrequently:true});
    ctx.drawImage(vid,0,0,160,120);
    const img=ctx.getImageData(0,0,160,120).data;
    const luma=new Float32Array(160*120);
    for(let i=0,j=0;i<img.length;i+=4,j++)luma[j]=0.299*img[i]+0.587*img[i+1]+0.114*img[i+2];
    let score=0,left=0,right=0;
    if(G.prevLuma){let ch=0;for(let j=0;j<luma.length;j++){const d=Math.abs(luma[j]-G.prevLuma[j]);if(d>28){ch++;if((j%160)<80)left++;else right++}}score=(ch/luma.length)*100}
    G.prevLuma=luma;
    G.lastLeft=left;G.lastRight=right;
    if(G.rally.active){G.rally.leftA+=left;G.rally.rightA+=right}
    G.motionBuf.push(score);if(G.motionBuf.length>3)G.motionBuf.shift();
    const sm=G.motionBuf.reduce((a,b)=>a+b,0)/G.motionBuf.length;
    updateMotor(sm);
  }
  // serve tease durante silenzio lungo (nessun colpo + poco movimento)
  const now=performance.now();
  const sinceHit=now-(G.rally.lastHit||0);
  if(!G.rally.active && sinceHit>4000 && now-G.lastServeTease>16000 && !G.busy && Math.random()<0.25){
    G.lastServeTease=now;serveTease();
  }
  // reset audio tag
  document.getElementById("atag").textContent=G.audLevel>15?"ascolto":"—";
}

// ===== DECISIONI COMMENTO (basate su DATI VERI: colpi contati) =====
function decidePoint(n,dur,r){
  const isLong=n>=8, isInfinite=n>=14;
  const hard = r.maxE > (r.energies.reduce((a,b)=>a+b,0)/r.energies.length)*1.5;
  let doIt = isLong || Math.random()<0.4;
  if(G.commentedLast && !isInfinite) doIt=false;
  if(!doIt||G.busy){G.commentedLast=false;return}
  G.commentedLast=true;

  const tot=r.leftA+r.rightA;let side="centro";
  if(tot>0){const diff=(r.leftA-r.rightA)/tot;if(diff>0.18)side="sinistra";else if(diff<-0.18)side="destra"}
  let coppia="le due coppie";if(side!=="centro")coppia=(side===S.sideA)?"Coppia A":"Coppia B";

  const durLabel=isInfinite?`uno scambio CHILOMETRICO da ${n} colpi`:isLong?`un bello scambio da ${n} colpi`:`uno scambio corto da ${n} colpi`;
  commentPoint({n,durLabel,side,coppia,hard,isInfinite,sec:Math.round(dur)});
}

async function commentPoint(info){
  const recent=G.history.slice(-3).join("\n");
  const prompt=`Sei IL TELECRONISTA più scatenato del bar dello sport. Partita di padel tra AMICI. Devi FAR RIDERE e GASARE come uno con la birra in mano davanti alla partita.

DATI REALI DEL PUNTO APPENA FINITO (li so dal suono dei colpi, sono affidabili):
- Numero di colpi nello scambio: ${info.n} (${info.durLabel})
- ${info.hard?"C'è stata una BORDATA, un colpo molto più forte degli altri (probabile schiacciata/mazzata)":"Colpi nella norma, niente bordate clamorose"}
- Azione concentrata: ${info.side}${info.side!=="centro"?` (lato di ${info.coppia})`:""}

GIOCATORI:
${teamsDesc()}

${recent?`ULTIMI COMMENTI (non ripeterti):\n${recent}`:""}

REGOLE:
- 1-2 frasi CORTISSIME, urlate, comiche.
- USA il numero di colpi! "Scambio da ${info.n} colpi, che fatica!" — è un dato vero, sfruttalo.
- ${info.hard?"C'è stata una bordata: gasala! 'Che mazzata!', 'Senti che legnata!'":""}
- ${info.isInfinite?"Scambio infinito: fingiti senza fiato, esagera comico!":""}
- ⚠️ NON sai chi ha vinto il punto. Non dichiararlo come certo, al massimo scherzaci.
- ⚠️ NON inventare tipi di colpo precisi che non puoi sapere (volée di rovescio ecc). Sai solo: quanti colpi, se c'è stata una bordata, da che lato.
- Esclamazioni da bar: "Maaadonna!", "Dai dai dai!", "Ammazza!", "Ma che roba!"
- Chiama i giocatori per nome, prendili in giro bonariamente.
- MAI dire che sei un'AI.

Solo il commento.`;
  const t=await llm(prompt);
  if(t){addC(info.hard||info.isInfinite?"hot":"norm",ts(),t);pushHist(t);await speak(t)}
}

async function interjectSmash(hitNum){
  // commento rapido a metà scambio su una bordata
  const t=await llm(`Telecronista scatenato da bar. In QUESTO momento, a metà di uno scambio di padel, è arrivata una BORDATA fortissima (lo sento dal suono). Spara UNA reazione cortissima e gasata, tipo "AMMAZZA CHE BOTTA!" o "Madonna che legnata!". Niente nomi di colpi tecnici. Solo l'esclamazione, 3-5 parole.`);
  if(t){addC("hot",ts(),t);pushHist(t);await speak(t)}
}

async function serveTease(){
  const recent=G.history.slice(-2).join("\n");
  const t=await llm(`Telecronista scatenato da bar, partita di padel tra amici. C'è una PAUSA, silenzio, si prendono tempo. UNA battuta corta comica per riempire l'attesa. ${recent?`Non ripetere: ${recent}`:""} Niente tecnicismi. Solo la frase.`);
  if(t){addC("serve",ts(),t);pushHist(t);await speak(t)}
}

function teamsDesc(){const a=S.pl.slice(0,2).map(p=>`${p.nm} (${p.sh})`).join(" e ");const b=S.pl.slice(2,4).map(p=>`${p.nm} (${p.sh})`).join(" e ");return `Coppia A: ${a} — lato ${S.sideA}\nCoppia B: ${b} — lato ${S.sideA==="sinistra"?"destra":"sinistra"}`}
function pushHist(t){G.history.push(t);if(G.history.length>6)G.history.shift()}

// ===== LLM =====
async function llm(userMsg){
  if(G.busy)return"";G.busy=true;
  try{
    const h={"Content-Type":"application/json"};const key=LIVE_KEY||S.key;
    if(key)h["Authorization"]="Bearer "+key;
    if(S.pv==="openrouter"){h["HTTP-Referer"]=location.href;h["X-Title"]="PadelCast"}
    const r=await fetch(S.url,{method:"POST",headers:h,body:JSON.stringify({model:S.md,max_tokens:100,temperature:1.05,messages:[{role:"user",content:userMsg}]})});
    if(!r.ok){const e=await r.text();if(r.status===401){addC("sys",ts(),"⚠️ 401 key rifiutata. Endpoint: "+S.url);LIVE_KEY=prompt("Key rifiutata, reinseriscila:")||""}else addC("sys",ts(),"⚠️ "+r.status+" "+e.substring(0,90));return""}
    const d=await r.json();return(d.choices?.[0]?.message?.content||"").trim();
  }catch(e){addC("sys",ts(),"⚠️ "+e.message);return""}finally{G.busy=false}
}

// ===== TTS =====
async function speak(text){G.speaking=true;try{if(S.tts==="elevenlabs"&&S.elKey&&S.elVoice)await speakEL(text);else await speakBrowser(text)}finally{setTimeout(()=>{G.speaking=false},300)}}
function speakBrowser(text){return new Promise(res=>{document.getElementById("spk").style.display="flex";const u=new SpeechSynthesisUtterance(text);u.lang="it-IT";u.rate=1.2;u.pitch=1.15;u.onend=u.onerror=()=>{document.getElementById("spk").style.display="none";res()};speechSynthesis.speak(u)})}
async function speakEL(text){document.getElementById("spk").style.display="flex";try{const r=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${S.elVoice}`,{method:"POST",headers:{"Content-Type":"application/json","xi-api-key":S.elKey},body:JSON.stringify({text,model_id:"eleven_multilingual_v2",voice_settings:{stability:0.3,similarity_boost:0.75,style:0.85,use_speaker_boost:true}})});if(!r.ok)throw 0;const url=URL.createObjectURL(await r.blob());await new Promise(res=>{const a=new Audio(url);a.onended=a.onerror=()=>{URL.revokeObjectURL(url);res()};a.play().catch(()=>res())})}catch(e){await speakBrowser(text)}finally{document.getElementById("spk").style.display="none"}}

// ===== UI =====
function setSt(t,x){document.getElementById("sd").className=`sd ${t==="on"?"on":"w"}`;document.getElementById("stx").textContent=x}
function updateMotor(sm){const f=document.getElementById("mfill");f.style.width=Math.min(100,sm*2.2)+"%";const tag=document.getElementById("mtag");if(sm>ACTION_TH){tag.textContent="GIOCO";tag.style.color="#ef4444"}else{tag.textContent="calmo";tag.style.color="#666"}}
function ts(){return new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}
function addC(type,time,text){const f=document.getElementById("feed");const prev=f.querySelector(".nw");if(prev)prev.classList.remove("nw");const r=document.createElement("div");r.className=`cr nw ${type}`;r.innerHTML=`<div class="ct">${time}</div><div class="cx${type==="hot"?" h":""}">${text}</div>`;f.appendChild(r);f.scrollTop=f.scrollHeight}

function stopLive(){
  if(G.tick)clearInterval(G.tick);if(G.raf)cancelAnimationFrame(G.raf);
  if(G.audioCtx)G.audioCtx.close();
  if(G.stream)G.stream.getTracks().forEach(t=>t.stop());
  speechSynthesis.cancel();
  G={stream:null,tick:null,raf:null,audioCtx:null,analyser:null,freq:null,prevFreq:null,fluxBuf:[],lastHitT:0,audLevel:0,prevLuma:null,motionBuf:[],state:"idle",lastActiveTs:0,idleSince:0,lastServeTease:0,rally:{active:false,hits:[],start:0,lastHit:0,maxE:0,energies:[],leftA:0,rightA:0},pointCount:0,commentedLast:false,history:[],busy:false,speaking:false,lastInterject:0};
  document.getElementById("feed").innerHTML="";
  document.getElementById("live").style.display="none";
  document.getElementById("setup").style.display="block";
}

rP();rSide();rPv();rTTS();chk();
</script>
