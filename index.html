<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Visione AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: -apple-system, system-ui, sans-serif; 
    background: #111; 
    color: #f0f0f0; 
    padding: 16px;
    min-height: 100vh;
  }
  h1 { font-size: 20px; margin-bottom: 12px; text-align: center; }
  h1 span { color: #4ade80; }
  
  .controls { 
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
    margin-bottom: 16px;
  }
  
  input[type="text"] {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #141414;
    color: #f0f0f0;
    font-size: 14px;
    outline: none;
  }
  
  button {
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  
  .btn-primary { background: #16a34a; color: #fff; }
  .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
  .btn-secondary { background: #2563eb; color: #fff; }
  .btn-danger { background: #ef4444; color: #fff; }
  
  video, img {
    width: 100%;
    border-radius: 8px;
    background: #000;
    margin-bottom: 12px;
  }
  
  .status {
    padding: 10px;
    border-radius: 8px;
    background: #1e1e1e;
    margin-bottom: 12px;
    font-size: 13px;
    text-align: center;
  }
  
  .status.loading { border-left: 3px solid #eab308; }
  .status.success { border-left: 3px solid #4ade80; }
  .status.error { border-left: 3px solid #ef4444; }
  
  .result {
    padding: 14px;
    border-radius: 8px;
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  
  .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 6px;
  }
  
  .hidden { display: none; }
</style>
</head>
<body>

<h1>🔍 Test <span>Visione AI</span></h1>

<div class="controls">
  <input type="text" id="api-key" placeholder="API Key DashScope (sk-...)">
  <button class="btn-primary" id="btn-start" onclick="startCamera()">📷 Avvia telecamera</button>
</div>

<div id="camera-section" class="hidden">
  <div class="label">Anteprima telecamera</div>
  <video id="video" autoplay playsinline muted></video>
  
  <div style="display:flex;gap:8px;margin-bottom:12px;">
    <button class="btn-secondary" style="flex:1" onclick="captureAndAnalyze()">🎯 Cattura e analizza</button>
    <button class="btn-danger" onclick="stopCamera()">⏹ Stop</button>
  </div>
  
  <div id="status" class="status hidden"></div>
  
  <div id="capture-section" class="hidden">
    <div class="label">Immagine catturata</div>
    <img id="captured-img" alt="Catturata">
    
    <div class="label">Cosa vede il modello</div>
    <div id="result" class="result">In attesa di analisi...</div>
  </div>
</div>

<script>
let stream = null;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    document.getElementById("video").srcObject = stream;
    document.getElementById("camera-section").classList.remove("hidden");
    document.getElementById("btn-start").classList.add("hidden");
  } catch (err) {
    alert("Errore telecamera: " + err.message);
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  document.getElementById("camera-section").classList.add("hidden");
  document.getElementById("capture-section").classList.add("hidden");
  document.getElementById("btn-start").classList.remove("hidden");
}

async function captureAndAnalyze() {
  const apiKey = document.getElementById("api-key").value.trim();
  if (!apiKey) {
    alert("Inserisci la API Key DashScope");
    return;
  }
  
  const video = document.getElementById("video");
  const canvas = document.createElement("canvas");
  canvas.width = 1280;
  canvas.height = 720;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0, 1280, 720);
  
  const base64 = canvas.toDataURL("image/jpeg", 0.85).split(",")[1];
  const imageUrl = canvas.toDataURL("image/jpeg", 0.85);
  
  // Mostra immagine catturata
  document.getElementById("captured-img").src = imageUrl;
  document.getElementById("capture-section").classList.remove("hidden");
  document.getElementById("result").textContent = "Analisi in corso...";
  
  const statusEl = document.getElementById("status");
  statusEl.classList.remove("hidden", "success", "error");
  statusEl.classList.add("loading");
  statusEl.textContent = "⏳ Invio immagine al modello...";
  
  const prompt = `Sei un assistente che analizza immagini. Guarda attentamente questa immagine e descrivi in italiano COSA VEDI, in modo dettagliato e obiettivo.

Struttura la risposta così:
1. CONTESTO: che tipo di ambiente/location è (esterno/interno, sport, ecc.)
2. PERSONE: quante persone vedi, cosa stanno facendo, cosa indossano (colori precisi)
3. OGGETTI: oggetti visibili (palle, racchette, reti, ecc.)
4. AZIONE: cosa sta succedendo in questo momento
5. DETTAGLI PADEL (se applicabile): posizione giocatori, stato del gioco, colori maglie

Sii preciso e descrivi SOLO ciò che vedi realmente. Non inventare.`;
  
  try {
    const resp = await fetch("https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: "qwen-vl-max",
        max_tokens: 600,
        messages: [
          {
            role: "user",
            content: [
              { type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64}` } },
              { type: "text", text: prompt }
            ]
          }
        ]
      })
    });
    
    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`API ${resp.status}: ${errText.substring(0, 300)}`);
    }
    
    const data = await resp.json();
    const text = data.choices?.[0]?.message?.content || "Nessuna risposta";
    
    document.getElementById("result").textContent = text;
    statusEl.classList.remove("loading");
    statusEl.classList.add("success");
    statusEl.textContent = "✅ Analisi completata";
    
  } catch (err) {
    console.error(err);
    statusEl.classList.remove("loading");
    statusEl.classList.add("error");
    statusEl.textContent = "❌ Errore: " + err.message;
    document.getElementById("result").textContent = "Errore: " + err.message;
  }
}
</script>

</body>
</html>
