<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PadelCast AI — Bar dello Sport</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0a0a0a;color:#f0f0f0;overflow:hidden;height:100dvh}
  .setup{padding:20px 16px;max-width:480px;margin:0 auto;overflow-y:auto;height:100dvh;padding-bottom:120px}
  h1{font-size:22px;font-weight:800;text-align:center;letter-spacing:-0.02em}
  h1 span{color:#4ade80}
  .sub{font-size:13px;color:#666;text-align:center;margin:4px 0 20px}
  .lb{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#555;margin-bottom:6px}
  .cd{background:#161616;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #1e1e1e}
  .ta{color:#4ade80}.tb{color:#f59e0b}
  input[type="text"]{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #252525;background:#0e0e0e;color:#f0f0f0;font-size:14px;outline:none;margin-bottom:8px}
  .cols{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 0}
  .dot{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .12s}
  .dot.s{border-color:#4ade80;transform:scale(1.15)}
  .dot.w{border-color:#333}.dot.w.s{border-color:#4ade80}
  .pb{padding:6px 12px;border-radius:6px;border:1px solid #252525;background:#0e0e0e;color:#777;cursor:pointer;font-size:12px}
  .pb.on{border-color:#4ade80;background:#14532d;color:#4ade80}
  .seg{display:flex;gap:6px}
  .ht{font-size:11px;color:#444;margin-top:4px;line-height:1.4}
  .go{width:100%;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px}
  .go.ok{background:#16a34a;color:#fff}.go.no{background:#1a1a1a;color:#444;cursor:not-allowed}

  .live{display:flex;flex-direction:column;height:100dvh}
  .vb{position:relative;flex-shrink:0;background:#000}
  .vb video{width:100%;display:block}
  .top{position:absolute;top:8px;left:8px;right:8px;display:flex;align-items:center;justify-content:space-between;gap:6px}
  .pill{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.8);border-radius:16px;padding:4px 10px;backdrop-filter:blur(4px)}
  .sd{width:7px;height:7px;border-radius:50%}
  .sd.on{background:#ef4444;box-shadow:0 0 6px #ef4444;animation:p 1.5s infinite}
  .sd.w{background:#eab308}
  .st{font-size:11px;color:#fff;font-weight:600}
  .lg{position:absolute;bottom:6px;left:6px;display:flex;gap:4px;flex-wrap:wrap}
  .li{background:rgba(0,0,0,.8);border-radius:8px;padding:2px 8px;display:flex;align-items:center;gap:4px;font-size:10px;backdrop-filter:blur(4px)}
  .ld{width:7px;height:7px;border-radius:50%}

  .meter{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#111;border-bottom:1px solid #1a1a1a;flex-shrink:0}
  .meter .ic{font-size:13px;width:18px;text-align:center}
  .mbar{flex:1;height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden}
  .mfill{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#eab308,#ef4444);border-radius:3px;transition:width .15s}
  .mtag{font-size:10px;color:#666;font-family:monospace;min-width:60px;text-align:right}

  .feed{flex:1;overflow-y:auto;padding:6px 12px}
  .cr{padding:8px 10px;border-radius:8px;margin-bottom:3px}
  .cr.nw{animation:fi .3s ease}
  .cr.norm{border-left:3px solid #4ade80;background:#0a1a0a}
  .cr.serve{border-left:3px solid #06b6d4;background:#04141a}
  .cr.hot{border-left:3px solid #ef4444;background:#1a0505}
  .cr.sys{border-left:3px solid #555;background:#111}
  .ct{color:#4ade80;font-family:monospace;font-size:10px;font-weight:600}
  .cx{font-size:13px;line-height:1.45;color:#ccc;margin-top:2px}
  .cx.h{color:#fff;font-weight:600;font-size:15px}

  .bb{padding:8px 12px 20px;flex-shrink:0}
  .sbtn{width:100%;padding:12px;border-radius:10px;border:none;background:#ef4444;color:#fff;font-size:14px;font-weight:700;cursor:pointer}

  @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="setup" class="setup">
  <div style="font-size:32px;text-align:center;margin-bottom:4px">🏓🍺</div>
  <h1>Padel<span>Cast</span> AI</h1>
  <p class="sub">Bar dello sport edition — gas a manetta</p>
  <div id="pbox"></div>

  <div class="cd">
    <div class="lb" style="color:#a78bfa">Lato del campo</div>
    <div class="ht" style="margin-bottom:8px">Da dove filmi, Coppia A è più verso...</div>
    <div class="seg" id="sideseg"></div>
  </div>

  <div class="cd">
    <div class="lb" style="color:#06b6d4">Voce telecronista (LLM testo)</div>
    <div id="pvb" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px"></div>
    <div id="apif"></div>
  </div>

  <div class="cd">
    <div class="lb" style="color:#ec4899">Voce parlata</div>
    <div id="ttsbtns" style="display:flex;gap:6px;margin-bottom:10px"></div>
    <div id="ttsf"></div>
  </div>

  <button class="go no" id="go" disabled onclick="startLive()">▶ Avvia la diretta</button>
  <div id="ghint" style="text-align:center;font-size:12px;color:#444;margin-top:8px"></div>
</div>

<div id="live" class="live" style="display:none">
  <div class="vb">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="mcnv" width="160" height="120" style="display:none"></canvas>
    <div class="top">
      <div class="pill"><div class="sd w" id="sd"></div><span class="st" id="stx">Avvio...</span></div>
      <div class="pill" id="spk" style="display:none"><span style="font-size:10px;color:#4ade80">🔊 parla</span></div>
    </div>
    <div class="lg" id="lg"></div>
  </div>
  <div class="meter">
    <span class="ic" id="mic">⏸</span>
    <div class="mbar"><div class="mfill" id="mfill"></div></div>
    <span class="mtag" id="mtag">attesa</span>
  </div>
  <div class="feed" id="feed"></div>
  <div class="bb"><button class="sbtn" onclick="stopLive()">⏹ Ferma</button></div>
</div>

<script>
const CL=[{n:"Rosso",h:"#DC2626"},{n:"Blu",h:"#2563EB"},{n:"Bianco",h:"#FFFFFF"},{n:"Nero",h:"#1a1a1a"},{n:"Verde",h:"#16A34A"},{n:"Giallo",h:"#EAB308"},{n:"Arancione",h:"#EA580C"},{n:"Rosa",h:"#EC4899"},{n:"Viola",h:"#7C3AED"},{n:"Azzurro",h:"#06B6D4"},{n:"Grigio",h:"#6B7280"}];

// Modelli di TESTO veloci (no vision serve)
const PV=[
  {id:"qwen-intl",nm:"Qwen (Internazionale)",url:"https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions",md:"qwen-vl-max",ht:"bailian.console.aliyun.com (Singapore) → API Key sk-... Modello testo veloce. Usa qwen-turbo per risparmiare."},
  {id:"qwen-cn",nm:"Qwen (Cina)",url:"https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions",md:"qwen-vl-max",ht:"dashscope.console.aliyun.com (Cina) → API Key sk-... Usa questo se il tuo account è cinese."},
  {id:"openrouter",nm:"OpenRouter",url:"https://openrouter.ai/api/v1/chat/completions",md:"google/gemini-flash-1.5",ht:"openrouter.ai → API Key sk-or-v1-..."},
  {id:"groq",nm:"Groq",url:"https://api.groq.com/openai/v1/chat/completions",md:"llama-3.3-70b-versatile",ht:"console.groq.com → API Key gsk_... gratis e velocissimo."},
  {id:"ollama",nm:"Ollama (locale)",url:"http://localhost:11434/v1/chat/completions",md:"llama3.1:8b",ht:"Locale, gratis. ollama pull llama3.1:8b"},
];

let S={
  pl:[{nm:"",sh:""},{nm:"",sh:""},{nm:"",sh:""},{nm:"",sh:""}],
  sideA:"sinistra",
  pv:"qwen-intl",key:"",url:PV[0].url,md:PV[0].md,
  tts:"browser", elKey:"", elVoice:"",
};

let G={
  stream:null, sampleI:null,
  prevLuma:null,
  motionBuf:[],          // recent smoothed motion scores
  state:"idle",          // idle | active
  pointStart:0, pointPeak:0, lastActiveTs:0, idleSince:0,
  leftAccum:0, rightAccum:0,
  pointCount:0, commentedLast:false,
  history:[], busy:false,
  lastServeTease:0,
};

var LIVE_KEY="";

// ===== tunables =====
const SAMPLE_MS=200, ACTION_TH=6, IDLE_TH=2.5, END_IDLE_MS=1400, MIN_POINT_MS=1200;

// ===== SETUP UI =====
function rP(){
  const b=document.getElementById("pbox");b.innerHTML="";
  S.pl.forEach((p,i)=>{
    const d=document.createElement("div");d.className="cd";
    const tc=i<2?"ta":"tb", tn=i<2?`Coppia A — G${i+1}`:`Coppia B — G${i-1}`;
    d.innerHTML=`<div class="lb ${tc}">${tn}</div><input type="text" placeholder="Nome" value="${p.nm}" oninput="S.pl[${i}].nm=this.value;chk()"><div class="lb">Maglia</div><div class="cols" id="c${i}"></div>`;
    b.appendChild(d);
    const cd=d.querySelector(`#c${i}`);
    CL.forEach(c=>{const dt=document.createElement("div");dt.className=`dot${p.sh===c.n?" s":""}${c.n==="Bianco"?" w":""}`;dt.style.backgroundColor=c.h;dt.title=c.n;dt.onclick=()=>{S.pl[i].sh=c.n;rP();chk()};cd.appendChild(dt)});
  });
}

function rSide(){
  const s=document.getElementById("sideseg");s.innerHTML="";
  ["sinistra","destra"].forEach(side=>{
    const b=document.createElement("button");b.className=`pb${S.sideA===side?" on":""}`;b.textContent=side;
    b.onclick=()=>{S.sideA=side;rSide()};s.appendChild(b);
  });
}

function rPv(){
  const b=document.getElementById("pvb");b.innerHTML="";
  PV.forEach(p=>{const bt=document.createElement("button");bt.className=`pb${S.pv===p.id?" on":""}`;bt.textContent=p.nm;bt.onclick=()=>{S.pv=p.id;S.url=p.url;S.md=p.md;rPv();chk()};b.appendChild(bt)});
  const pv=PV.find(p=>p.id===S.pv);
  document.getElementById("apif").innerHTML=`${S.pv!=="ollama"?`<div class="ht" style="color:#4ade80;margin-bottom:8px">La API key ti verrà chiesta all'avvio.</div>`:""}
    <input type="text" placeholder="Endpoint" value="${S.url}" oninput="S.url=this.value">
    <input type="text" placeholder="Modello" value="${S.md}" oninput="S.md=this.value">
    <div class="ht">${pv.ht}</div>`;
}

function rTTS(){
  const b=document.getElementById("ttsbtns");b.innerHTML="";
  [{id:"browser",nm:"Browser (gratis)"},{id:"elevenlabs",nm:"ElevenLabs (naturale)"}].forEach(t=>{
    const bt=document.createElement("button");bt.className=`pb${S.tts===t.id?" on":""}`;bt.textContent=t.nm;
    bt.onclick=()=>{S.tts=t.id;rTTS()};b.appendChild(bt);
  });
  const f=document.getElementById("ttsf");
  if(S.tts==="elevenlabs"){
    f.innerHTML=`<input type="text" placeholder="ElevenLabs Voice ID" value="${S.elVoice}" oninput="S.elVoice=this.value">
      <div class="ht">elevenlabs.io → gratis ogni mese. La API key ElevenLabs te la chiedo all'avvio. Scegli una voce italiana e copia il Voice ID.</div>`;
  } else {
    f.innerHTML=`<div class="ht">Voce del telefono. Parte subito, suona un po' robotica.</div>`;
  }
}

function chk(){
  const pok=S.pl.every(p=>p.nm&&p.sh);
  const aok=S.url&&S.md;
  const ok=pok&&aok;
  const btn=document.getElementById("go");
  btn.className=ok?"go ok":"go no";btn.disabled=!ok;
  const h=document.getElementById("ghint");
  h.textContent=!pok?"Metti nome e maglia per tutti e 4":"Si parte!";
  h.style.color=ok?"#4ade80":"#444";
}

// ===== LIVE =====
async function startLive(){
  if(S.pv!=="ollama"){
    const k=prompt("Incolla la API Key del modello di testo:");
    if(!k){alert("Serve la API key.");return;}
    LIVE_KEY=k.trim();
  }
  if(S.tts==="elevenlabs"){
    const ek=prompt("Incolla la API Key di ElevenLabs:");
    if(ek) S.elKey=ek.trim();
  }

  document.getElementById("setup").style.display="none";
  document.getElementById("live").style.display="flex";

  const lg=document.getElementById("lg");lg.innerHTML="";
  S.pl.forEach(p=>{const c=CL.find(x=>x.n===p.sh);const d=document.createElement("div");d.className="li";d.innerHTML=`<div class="ld" style="background:${c?.h||"#888"}"></div>${p.nm}`;lg.appendChild(d)});

  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}},audio:false});
    G.stream=stream;
    const vid=document.getElementById("vid");vid.srcObject=stream;
    vid.onloadeddata=()=>{
      setSt("on","In diretta");
      // Intro
      kickoff();
      G.sampleI=setInterval(sampleMotion,SAMPLE_MS);
    };
  }catch(e){addC("sys",ts(),"Errore telecamera: "+e.message)}
}

async function kickoff(){
  const names=S.pl.map(p=>p.nm).join(", ");
  const intro=await llm(`Sei un telecronista scatenatissimo da bar dello sport. Apri la diretta di una partita di padel tra amici: ${names}. UNA frase di apertura esplosiva e divertente per presentare la sfida. Niente tecnicismi. Solo la frase.`);
  if(intro){addC("norm",ts(),intro);await speak(intro);}
}

// ===== MOTION ENGINE =====
function sampleMotion(){
  const vid=document.getElementById("vid");
  if(!vid||vid.readyState<2)return;
  const cnv=document.getElementById("mcnv");
  const ctx=cnv.getContext("2d",{willReadFrequently:true});
  ctx.drawImage(vid,0,0,160,120);
  const img=ctx.getImageData(0,0,160,120).data;

  // luma
  const luma=new Float32Array(160*120);
  for(let i=0,j=0;i<img.length;i+=4,j++){
    luma[j]=0.299*img[i]+0.587*img[i+1]+0.114*img[i+2];
  }

  let score=0, left=0, right=0;
  if(G.prevLuma){
    let changed=0;
    for(let j=0;j<luma.length;j++){
      const d=Math.abs(luma[j]-G.prevLuma[j]);
      if(d>28){
        changed++;
        const x=j%160;
        if(x<80) left++; else right++;
      }
    }
    score=(changed/luma.length)*100;
  }
  G.prevLuma=luma;

  // smooth (moving avg of last 3)
  G.motionBuf.push(score);
  if(G.motionBuf.length>3) G.motionBuf.shift();
  const sm=G.motionBuf.reduce((a,b)=>a+b,0)/G.motionBuf.length;

  updateMeter(sm);
  processState(sm,left,right);
}

function processState(sm,left,right){
  const now=Date.now();

  if(G.state==="idle"){
    if(sm>ACTION_TH){
      // punto inizia
      G.state="active";
      G.pointStart=now;
      G.pointPeak=sm;
      G.leftAccum=left; G.rightAccum=right;
      G.lastActiveTs=now;
    } else {
      // idle prolungato → ogni tanto battuta di attesa
      if(G.idleSince===0) G.idleSince=now;
      const idleDur=now-G.idleSince;
      if(idleDur>2500 && now-G.lastServeTease>15000 && !G.busy && Math.random()<0.3){
        G.lastServeTease=now;
        serveTease();
      }
    }
  } else { // active
    G.idleSince=0;
    if(sm>IDLE_TH){
      G.lastActiveTs=now;
      if(sm>G.pointPeak) G.pointPeak=sm;
      G.leftAccum+=left; G.rightAccum+=right;
    }
    // fine punto?
    if(now-G.lastActiveTs>END_IDLE_MS){
      const dur=G.lastActiveTs-G.pointStart;
      G.state="idle";
      G.idleSince=now;
      if(dur>=MIN_POINT_MS){
        G.pointCount++;
        decidePoint(dur);
      }
    }
  }
}

function decidePoint(durMs){
  const sec=durMs/1000;
  const peak=G.pointPeak;
  const isLong=sec>=7, isInfinite=sec>=13;
  const isIntense=peak>=25, isFurious=peak>=38;
  // commenta ~40% dei punti, sempre i lunghi/intensi, mai due di fila (tranne furiosi)
  let doIt = isLong||isIntense||Math.random()<0.4;
  if(G.commentedLast && !isFurious && !isInfinite) doIt=false;

  if(!doIt){ G.commentedLast=false; return; }
  if(G.busy){ G.commentedLast=false; return; }
  G.commentedLast=true;

  // dove si è concentrata l'azione
  const tot=G.leftAccum+G.rightAccum;
  let side="centro";
  if(tot>0){
    const diff=(G.leftAccum-G.rightAccum)/tot;
    if(diff>0.18) side="sinistra"; else if(diff<-0.18) side="destra";
  }
  // mappa lato → coppia
  let coppiaAttiva="entrambe le coppie";
  if(side!=="centro"){
    coppiaAttiva = (side===S.sideA) ? "Coppia A" : "Coppia B";
  }

  const durLabel = isInfinite?"INFINITO, uno scambio chilometrico":isLong?"bello lungo":sec<3?"un punto lampo":"normale";
  const intLabel = isFurious?"FURIOSO, colpi a tutta birra":isIntense?"acceso e vivace":"tranquillo";

  commentPoint({durLabel,intLabel,sec:Math.round(sec),side,coppiaAttiva,isFurious,isInfinite});
}

async function commentPoint(info){
  const players=teamsDesc();
  const recent=G.history.slice(-3).join("\n");
  const prompt=`Sei IL TELECRONISTA più scatenato del bar dello sport. Stai commentando una partita di padel tra AMICI (livello amatoriale). Il tuo lavoro è FAR RIDERE e GASARE, come uno che urla davanti alla partita con la birra in mano.

È APPENA FINITO UN PUNTO:
- Durata scambio: ${info.durLabel} (${info.sec} secondi)
- Intensità: ${info.intLabel}
- L'azione si è concentrata: ${info.side}${info.side!=="centro"?` (lato di ${info.coppiaAttiva})`:""}

GIOCATORI:
${players}

${recent?`ULTIMI COMMENTI (NON ripeterti):\n${recent}`:""}

REGOLE FERREE:
- 1-2 frasi CORTISSIME. Stile parlato, urlato, comico.
- Esclamazioni da bar: "Maaadonna!", "Ammazza che scambio!", "Dai dai dai!", "Ma dove vai?!", "Dentrooo!", "Dai su, svegliaaa!"
- Prendi in giro i giocatori BONARIAMENTE, chiamali per nome.
- ⚠️ NON sai chi ha vinto il punto (non vedi il video, solo il movimento). Quindi NON dichiarare chi ha vinto come fatto certo. Puoi scherzarci ("e manco si capisce chi ha vinto, ma che spettacolo!") o gasare il lato dove c'era l'azione.
- ⚠️ NON descrivere colpi tecnici specifici (bandeja, smash...) perché non li vedi. Reagisci all'ENERGIA e alla DURATA.
- ${info.isInfinite?"Lo scambio è stato INFINITO: esagera, fingi di essere senza fiato, comico!":""}
- ${info.isFurious?"Roba furiosa: alza la voce, esplodi!":""}
- MAI dire che sei un'AI o un telecronista.

Solo il commento, niente altro.`;

  const txt=await llm(prompt);
  if(txt){
    const cls=info.isFurious||info.isInfinite?"hot":"norm";
    addC(cls,ts(),txt);
    pushHist(txt);
    await speak(txt);
  }
}

async function serveTease(){
  const players=teamsDesc();
  const recent=G.history.slice(-2).join("\n");
  const txt=await llm(`Sei un telecronista scatenato da bar dello sport, partita di padel tra amici. C'è una PAUSA, si stanno prendendo tempo prima di giocare. Fai UNA battuta corta e comica per riempire l'attesa / creare tensione finta. Tipo "Eccoci, gran concentrazione qui..." o "Ma quanto ci mettono, è ora di pranzo!". 
GIOCATORI: ${players}
${recent?`Non ripetere: ${recent}`:""}
Niente tecnicismi, non sai cosa stanno facendo di preciso. Solo la frase.`);
  if(txt){addC("serve",ts(),txt);pushHist(txt);await speak(txt);}
}

function teamsDesc(){
  const a=S.pl.slice(0,2).map(p=>`${p.nm} (${p.sh})`).join(" e ");
  const b=S.pl.slice(2,4).map(p=>`${p.nm} (${p.sh})`).join(" e ");
  return `Coppia A: ${a} — lato ${S.sideA}\nCoppia B: ${b} — lato ${S.sideA==="sinistra"?"destra":"sinistra"}`;
}

function pushHist(t){G.history.push(t);if(G.history.length>6)G.history.shift();}

// ===== LLM (solo testo) =====
async function llm(userMsg){
  if(G.busy) return "";
  G.busy=true;
  try{
    const h={"Content-Type":"application/json"};
    const key=LIVE_KEY||S.key;
    if(key) h["Authorization"]="Bearer "+key;
    if(S.pv==="openrouter"){h["HTTP-Referer"]=location.href;h["X-Title"]="PadelCast"}
    const r=await fetch(S.url,{method:"POST",headers:h,body:JSON.stringify({
      model:S.md, max_tokens:120, temperature:1.0,
      messages:[{role:"user",content:userMsg}]
    })});
    if(!r.ok){
      const e=await r.text();
      if(r.status===401){
        addC("sys",ts(),"⚠️ 401 — key rifiutata. Controlla: provider giusto? endpoint giusto (intl vs cina)? key valida? Endpoint usato: "+S.url);
        LIVE_KEY=prompt("API Key rifiutata. Reinseriscila (o premi annulla e cambia provider/endpoint):")||"";
      } else {
        addC("sys",ts(),"⚠️ "+r.status+" "+e.substring(0,100));
      }
      return "";
    }
    const d=await r.json();
    return (d.choices?.[0]?.message?.content||"").trim();
  }catch(e){
    addC("sys",ts(),"⚠️ "+e.message);
    return "";
  }finally{ G.busy=false; }
}

// ===== TTS =====
async function speak(text){
  if(S.tts==="elevenlabs"&&S.elKey&&S.elVoice) return speakEL(text);
  return speakBrowser(text);
}
function speakBrowser(text){
  return new Promise(res=>{
    document.getElementById("spk").style.display="flex";
    const u=new SpeechSynthesisUtterance(text);
    u.lang="it-IT";u.rate=1.2;u.pitch=1.15;
    u.onend=u.onerror=()=>{document.getElementById("spk").style.display="none";res()};
    speechSynthesis.speak(u);
  });
}
async function speakEL(text){
  document.getElementById("spk").style.display="flex";
  try{
    const r=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${S.elVoice}`,{
      method:"POST",
      headers:{"Content-Type":"application/json","xi-api-key":S.elKey},
      body:JSON.stringify({text,model_id:"eleven_multilingual_v2",voice_settings:{stability:0.3,similarity_boost:0.75,style:0.8,use_speaker_boost:true}})
    });
    if(!r.ok)throw new Error("EL "+r.status);
    const url=URL.createObjectURL(await r.blob());
    await new Promise(res=>{const a=new Audio(url);a.onended=a.onerror=()=>{URL.revokeObjectURL(url);res()};a.play().catch(()=>res())});
  }catch(e){await speakBrowser(text)}
  finally{document.getElementById("spk").style.display="none"}
}

// ===== UI helpers =====
function setSt(t,x){document.getElementById("sd").className=`sd ${t==="on"?"on":"w"}`;document.getElementById("stx").textContent=x}
function updateMeter(sm){
  const f=document.getElementById("mfill");
  const pct=Math.min(100,sm*2.2);
  f.style.width=pct+"%";
  const ic=document.getElementById("mic"), tag=document.getElementById("mtag");
  if(G.state==="active"){ic.textContent="⚡";tag.textContent="GIOCO";tag.style.color="#ef4444"}
  else{ic.textContent="⏸";tag.textContent="attesa";tag.style.color="#666"}
}
function ts(){return new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}
function addC(type,time,text){
  const f=document.getElementById("feed");
  const prev=f.querySelector(".nw");if(prev)prev.classList.remove("nw");
  const r=document.createElement("div");
  r.className=`cr nw ${type}`;
  r.innerHTML=`<div class="ct">${time}</div><div class="cx${type==="hot"?" h":""}">${text}</div>`;
  f.appendChild(r);f.scrollTop=f.scrollHeight;
}

function stopLive(){
  if(G.sampleI)clearInterval(G.sampleI);
  if(G.stream)G.stream.getTracks().forEach(t=>t.stop());
  speechSynthesis.cancel();
  G={stream:null,sampleI:null,prevLuma:null,motionBuf:[],state:"idle",pointStart:0,pointPeak:0,lastActiveTs:0,idleSince:0,leftAccum:0,rightAccum:0,pointCount:0,commentedLast:false,history:[],busy:false,lastServeTease:0};
  document.getElementById("feed").innerHTML="";
  document.getElementById("live").style.display="none";
  document.getElementById("setup").style.display="block";
}

rP();rSide();rPv();rTTS();chk();
</script>
