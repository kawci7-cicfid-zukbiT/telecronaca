<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PadelCast Test — Telecronaca Live</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: -apple-system, system-ui, sans-serif; 
    background: #111; 
    color: #f0f0f0; 
    padding: 16px;
    min-height: 100vh;
  }
  h1 { font-size: 20px; margin-bottom: 4px; text-align: center; }
  h1 span { color: #4ade80; }
  .sub { font-size: 12px; color: #888; text-align: center; margin-bottom: 16px; }
  
  .controls { 
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
    margin-bottom: 16px;
  }
  
  input[type="text"] {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #141414;
    color: #f0f0f0;
    font-size: 14px;
    outline: none;
  }
  
  button {
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  
  .btn-primary { background: #16a34a; color: #fff; }
  .btn-live { background: #ef4444; color: #fff; }
  .btn-secondary { background: #2563eb; color: #fff; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-stop { background: #dc2626; color: #fff; }
  button:disabled { background: #333; color: #666; cursor: not-allowed; }
  
  video {
    width: 100%;
    border-radius: 8px;
    background: #000;
    margin-bottom: 12px;
  }
  
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    border-radius: 8px;
    background: #1e1e1e;
    margin-bottom: 12px;
    font-size: 13px;
  }
  
  .live-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .live-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ef4444;
    box-shadow: 0 0 8px #ef4444;
    animation: pulse 1.5s infinite;
  }
  
  .live-dot.waiting { background: #eab308; box-shadow: 0 0 8px #eab308; }
  
  .speaking {
    color: #4ade80;
    font-size: 12px;
  }
  
  .commentary-feed {
    background: #1e1e1e;
    border-radius: 8px;
    padding: 12px;
    max-height: 400px;
    overflow-y: auto;
    border: 1px solid #2a2a2a;
  }
  
  .comment-row {
    padding: 8px;
    border-radius: 6px;
    margin-bottom: 6px;
    background: #141414;
    animation: fadeIn 0.3s ease;
  }
  
  .comment-row.latest {
    background: #1e3a5f;
    border-left: 3px solid #06b6d4;
  }
  
  .comment-time {
    color: #4ade80;
    font-family: monospace;
    font-size: 11px;
    font-weight: 600;
    margin-right: 8px;
  }
  
  .comment-text {
    font-size: 14px;
    line-height: 1.5;
    color: #ddd;
  }
  
  .hidden { display: none; }
  
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<h1>🎙️ Padel<span>Cast</span> Test</h1>
<p class="sub">Telecronaca live con commento vocale</p>

<div class="controls">
  <input type="text" id="api-key" placeholder="API Key DashScope (sk-...)">
  <button class="btn-primary" id="btn-start" onclick="startCamera()">📷 Avvia telecamera</button>
</div>

<div id="camera-section" class="hidden">
  <video id="video" autoplay playsinline muted></video>
  
  <div style="display:flex;gap:8px;margin-bottom:12px;">
    <button class="btn-live" id="btn-live" style="flex:1" onclick="startLive()">🔴 Avvia telecronaca LIVE</button>
    <button class="btn-stop hidden" id="btn-stop" onclick="stopLive()">⏹ Stop</button>
  </div>
  
  <div class="status-bar">
    <div class="live-indicator">
      <div class="live-dot waiting" id="live-dot"></div>
      <span id="status-text">Pronto</span>
    </div>
    <div class="speaking hidden" id="speaking-pill">🔊 Parlando...</div>
  </div>
  
  <div class="commentary-feed" id="feed">
    <div style="text-align:center;color:#666;font-size:13px;padding:20px;">
      Avvia la telecronaca per vedere i commenti live
    </div>
  </div>
</div>

<script>
let stream = null;
let liveInterval = null;
let isProcessing = false;
let history = [];

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    document.getElementById("video").srcObject = stream;
    document.getElementById("camera-section").classList.remove("hidden");
    document.getElementById("btn-start").classList.add("hidden");
  } catch (err) {
    alert("Errore telecamera: " + err.message);
  }
}

function startLive() {
  const apiKey = document.getElementById("api-key").value.trim();
  if (!apiKey) {
    alert("Inserisci la API Key DashScope");
    return;
  }
  
  document.getElementById("btn-live").classList.add("hidden");
  document.getElementById("btn-stop").classList.remove("hidden");
  document.getElementById("live-dot").classList.remove("waiting");
  document.getElementById("status-text").textContent = "In diretta";
  document.getElementById("feed").innerHTML = "";
  
  // Primo commento immediato
  setTimeout(() => captureAndComment(), 1500);
  
  // Poi ogni 8 secondi
  liveInterval = setInterval(() => captureAndComment(), 8000);
}

function stopLive() {
  if (liveInterval) clearInterval(liveInterval);
  window.speechSynthesis.cancel();
  
  document.getElementById("btn-live").classList.remove("hidden");
  document.getElementById("btn-stop").classList.add("hidden");
  document.getElementById("live-dot").classList.add("waiting");
  document.getElementById("status-text").textContent = "Fermato";
  document.getElementById("speaking-pill").classList.add("hidden");
}

async function captureAndComment() {
  if (isProcessing) return;
  
  const video = document.getElementById("video");
  if (!video || video.readyState < 2) return;
  
  isProcessing = true;
  document.getElementById("status-text").textContent = "Analisi...";
  document.getElementById("live-dot").classList.add("waiting");
  
  try {
    const canvas = document.createElement("canvas");
    canvas.width = 1280;
    canvas.height = 720;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, 1280, 720);
    const base64 = canvas.toDataURL("image/jpeg", 0.85).split(",")[1];
    
    const recentComments = history.slice(-2).map(c => `- ${c}`).join("\n");
    
    const prompt = `Sei un telecronista di padel entusiasta e competente. Stai commentando una partita LIVE guardando l'immagine.

ISTRUZIONI OBBLIGATORIE:
1. Prima descrivi in 1 frase COSA VEDI nell'immagine (giocatori, posizione, palla, azione)
2. Poi fai un commento da telecronista in 1 frase (energico, specifico del padel)

TERMINI PADEL DA USARE:
- Colpi: dritto, rovescio, volee, smash, bandeja, vibora, chiquita, globo, lob
- Posizioni: rete, fondo campo, centro
- Elementi: vetro, rete, campo

REGOLE:
- Identifica i giocatori dai colori delle maglie che vedi
- Se non vedi la palla, dillo chiaramente
- Sii REALISTICO: commenta solo ciò che vedi
- NON ripetere concetti dei commenti precedenti
- Rispondi SOLO con il commento finale (max 2 frasi), senza etichette

ESEMPI:
"Vedo Marco (rosso) a rete con palla bassa! Volee stretta che muore sul vetro!"
"Globo difensivo perfetto! La coppia blu è costretta a fondo campo!"
"Punto fatto! Si riparte, tensione altissima!"

${recentComments ? `Ultimi commenti (non ripetere):\n${recentComments}` : ""}

Ora commenta:`;
    
    const apiKey = document.getElementById("api-key").value.trim();
    
    const resp = await fetch("https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: "qwen-vl-max",
        max_tokens: 150,
        messages: [
          {
            role: "user",
            content: [
              { type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64}` } },
              { type: "text", text: prompt }
            ]
          }
        ]
      })
    });
    
    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`API ${resp.status}: ${errText.substring(0, 200)}`);
    }
    
    const data = await resp.json();
    const text = data.choices?.[0]?.message?.content || "";
    
    if (text) {
      addComment(text);
      history.push(text);
      if (history.length > 3) history.shift();
      speakText(text);
    }
    
    document.getElementById("status-text").textContent = "In diretta";
    document.getElementById("live-dot").classList.remove("waiting");
    
  } catch (err) {
    console.error(err);
    addComment("⚠️ Errore: " + err.message);
    document.getElementById("status-text").textContent = "Errore";
  } finally {
    isProcessing = false;
  }
}

function addComment(text) {
  const feed = document.getElementById("feed");
  const prev = feed.querySelector(".latest");
  if (prev) prev.classList.remove("latest");
  
  const now = new Date().toLocaleTimeString("it-IT", { 
    hour: "2-digit", 
    minute: "2-digit", 
    second: "2-digit" 
  });
  
  const row = document.createElement("div");
  row.className = "comment-row latest";
  row.innerHTML = `<span class="comment-time">${now}</span><span class="comment-text">${text}</span>`;
  feed.appendChild(row);
  feed.scrollTop = feed.scrollHeight;
}

let speakQueue = [];
let isSpeaking = false;

function speakText(text) {
  speakQueue.push(text);
  processSpeak();
}

function processSpeak() {
  if (isSpeaking || speakQueue.length === 0) return;
  isSpeaking = true;
  document.getElementById("speaking-pill").classList.remove("hidden");
  
  const text = speakQueue.shift();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = "it-IT";
  utt.rate = 1.1;
  utt.pitch = 1.05;
  
  utt.onend = utt.onerror = () => {
    isSpeaking = false;
    document.getElementById("speaking-pill").classList.add("hidden");
    processSpeak();
  };
  
  window.speechSynthesis.speak(utt);
}
</script>

</body>
</html>
